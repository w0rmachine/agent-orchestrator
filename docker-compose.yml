services:
  db:
    image: docker.io/library/postgres:16
    container_name: ai-kanban-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_kanban
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: ai-kanban-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ai-kanban-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_kanban
      - REDIS_URL=redis://redis:6379/0
      - OBSIDIAN_VAULT_PATH=${OBSIDIAN_VAULT_PATH}
      - YOUTRACK_TOKEN=${YOUTRACK_TOKEN}
      - YOUTRACK_TOKEN_TEAM=${YOUTRACK_TOKEN_TEAM}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
      - ./config.yaml:/app/config.yaml
      - ${OBSIDIAN_VAULT_HOST_PATH}:${OBSIDIAN_VAULT_CONTAINER_PATH}
    command: uv run uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ai-kanban-worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_kanban
      - REDIS_URL=redis://redis:6379/0
      - OBSIDIAN_VAULT_PATH=${OBSIDIAN_VAULT_PATH}
      - YOUTRACK_TOKEN=${YOUTRACK_TOKEN}
      - YOUTRACK_TOKEN_TEAM=${YOUTRACK_TOKEN_TEAM}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./config.yaml:/app/config.yaml
      - ${OBSIDIAN_VAULT_HOST_PATH}:${OBSIDIAN_VAULT_CONTAINER_PATH}
    command: uv run rq worker ai_tasks --url redis://redis:6379/0

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-kanban-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
